services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: kindloop-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: kindloop
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - kindloop-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kindloop-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/kindloop?authSource=admin
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_REFRESH_SECRET: your-super-secret-refresh-key-change-in-production
      JWT_EXPIRE: 15m
      JWT_REFRESH_EXPIRE: 7d
      FRONTEND_URL: http://localhost:5173
      AI_MICROSERVICE_URL: http://ai-microservice:8000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5000:5000"
      - "9229:9229"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongodb
      - ai-microservice
    networks:
      - kindloop-network

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kindloop-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_SOCKET_URL: http://localhost:5000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - kindloop-network

  # AI Microservice (Python FastAPI)
  ai-microservice:
    build:
      context: ./pythonBackend
      dockerfile: Dockerfile
    container_name: kindloop-ai
    restart: unless-stopped
    environment:
      PORT: 8000
      DEBUG: "true"
      TEMP_DIR: /tmp/ai-tools
      MAX_WORKERS: 4
    ports:
      - "8000:8000"
    volumes:
      - ./pythonBackend/app:/app/app
      - ./pythonBackend/modules:/app/modules
      - ai_temp_data:/tmp/ai-tools
    networks:
      - kindloop-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import requests; requests.get('http://localhost:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mongodb_data:
    driver: local
  ai_temp_data:
    driver: local

networks:
  kindloop-network:
    driver: bridge
