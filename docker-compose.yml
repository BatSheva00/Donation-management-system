# Default stack: backend + frontend + AI — database is MongoDB Atlas (set MONGO_URI in backend/.env).
# Optional local MongoDB: docker compose -f docker-compose.yml -f docker-compose.mongodb.yml up

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kindloop-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 5000
      CHOKIDAR_USEPOLLING: "true"
      AI_MICROSERVICE_URL: http://ai-microservice:8000
    ports:
      - "5000:5000"
      - "9229:9229"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      ai-microservice:
        condition: service_started
    networks:
      - kindloop-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kindloop-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_SOCKET_URL: http://localhost:5000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - kindloop-network

  ai-microservice:
    build:
      context: ./pythonBackend
      dockerfile: Dockerfile
    container_name: kindloop-ai
    restart: unless-stopped
    environment:
      PORT: 8000
      DEBUG: "true"
      TEMP_DIR: /tmp/ai-tools
      MAX_WORKERS: 4
    ports:
      - "8000:8000"
    volumes:
      - ./pythonBackend/app:/app/app
      - ./pythonBackend/modules:/app/modules
      - ai_temp_data:/tmp/ai-tools
    networks:
      - kindloop-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import requests; requests.get('http://localhost:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  ai_temp_data:
    driver: local

networks:
  kindloop-network:
    driver: bridge
